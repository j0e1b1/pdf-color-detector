<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Color Detector</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h3>PDF Color Scanner</h3>
        <p class="desc">Find out which pages need color printing.</p>
        <button id="scan-btn">Scan Active PDF</button>
        <div id="status">Ready to scan...</div>
        <div id="results"></div>
        
        <button id="copy-btn-color">Copy Color Page Numbers</button>
        <button id="copy-btn-bw">Copy B&W Page Numbers</button>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
